<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b3d5c">
  <title>Task Manager</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <!-- Sign-in -->
  <section id="signin-view" class="signin">
    <div class="signin-card">
      <div class="logo">🌊</div>
      <h1>Task Manager</h1>
      <p class="muted">Sign in with your work Google account.</p>
      <div id="signin"></div>
    </div>
  </section>

  <!-- App -->
  <section id="app-view" class="hidden">
    <header class="topbar">
      <button id="back-btn" class="icon-btn hidden" aria-label="Back">‹</button>
      <h1 id="title">Boards</h1>
      <div class="spacer"></div>
      <span id="user-chip" class="chip"></span>
      <button id="signout-btn" class="icon-btn" aria-label="Sign out">⎋</button>
    </header>
    <main id="main" class="main"></main>
  </section>

  <div id="sheet-backdrop" class="backdrop hidden"></div>
  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
